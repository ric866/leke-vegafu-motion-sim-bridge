repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

-   repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
    -   id: bandit
        additional_dependencies: [pbr, setuptools]
        # We removed "-r", "src/" because pre-commit handles the files for us!
        args: ["-s", "B404,B603,B110"]

-   repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
    -   id: black
