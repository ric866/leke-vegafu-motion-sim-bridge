name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          cd src
          pyinstaller --name "VegaMissionControl" --noconsole --onefile main.py

      # Scenario 1: Always upload as an Artifact (Great for manual testing!)
      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VegaMissionControl-EXE
          path: src/dist/VegaMissionControl.exe
          retention-days: 7

      # Scenario 2: ONLY upload to a Release if a Release actually triggered this
      - name: Upload EXE to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/VegaMissionControl.exe
