name: Build Windows EXE

# This ensures the action only runs when you publish a Release on GitHub
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write


jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          cd src
          # --name sets the output file name
          # --onefile packs everything into a single .exe
          # --noconsole hides the black command prompt window
          pyinstaller --name "VegaMissionControl" --noconsole --onefile main.py

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/dist/VegaMissionControl.exe
