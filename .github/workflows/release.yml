name: Multiverse Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We install pre-commit alongside pyinstaller
        pip install pre-commit pyinstaller -r requirements.txt

    - name: Run Local Linting (Black, Bandit, etc.)
      # This command reads your .pre-commit-config.yaml and runs all checks
      run: pre-commit run --all-files

    - name: Build Binary (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onefile --name "Vegafu_Motion_Controller_Bridge" --paths src src/main_gui.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: dist/*
